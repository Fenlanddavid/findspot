name: Monthly dependency audit

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  outdated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
      - run: npm ci
      - name: Report outdated dependencies
        run: npm outdated

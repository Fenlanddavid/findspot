<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FindSpot UK</title>
  <script>
    // GitHub Pages SPA redirect
    // Encodes the requested path+query as a param on the base path so the
    // service worker / index.html can restore it before React Router boots.
    // segmentCount = number of path segments in the base path (1 for /findspot)
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
